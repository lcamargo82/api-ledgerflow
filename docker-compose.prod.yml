services:
  migrate:
    container_name: api-ledgerflow-migrate
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: npm run prisma:deploy
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - api_ledgerflow_network
    profiles:
      - migration

  api:
    container_name: api-ledgerflow-api
    image: api-ledgerflow-api:${API_LEDGERFLOW_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    env_file:
      - .env
    ports:
      - "${HOST_API_PORT:-3020}:${API_PORT:-3021}"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - api_ledgerflow_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:${API_PORT:-3021}/health/liveness').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    container_name: api-ledgerflow-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-api_ledgerflow}
      POSTGRES_USER: ${POSTGRES_USER:-api_ledgerflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-api_ledgerflow}
      TZ: ${TZ:-UTC}
    ports:
      - "${POSTGRES_PUBLIC_PORT:-55433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api_ledgerflow_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-api_ledgerflow} -d ${POSTGRES_DB:-api_ledgerflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailpit:
    container_name: api-ledgerflow-mailpit
    image: axllent/mailpit:latest
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "${MAILPIT_SMTP_PORT:-1027}:1025"
      - "${MAILPIT_UI_PORT:-8027}:8025"
    networks:
      - api_ledgerflow_network
    restart: unless-stopped

  prometheus:
    container_name: api-ledgerflow-prometheus
    image: prom/prometheus:v2.54.1
    ports:
      - "${PROMETHEUS_PORT_PUBLIC:-9092}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - api_ledgerflow_network
    restart: unless-stopped

  grafana:
    container_name: api-ledgerflow-grafana
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      TZ: ${TZ:-UTC}
    ports:
      - "${GRAFANA_PORT:-3003}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - api_ledgerflow_network
    restart: unless-stopped

networks:
  api_ledgerflow_network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
